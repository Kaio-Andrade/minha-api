# Nome exibido na aba "Actions" do GitHub
name: CI/CD — API de Livros

# QUANDO executar: a cada push na main
on:
  push:
    branches: [main]

  workflow_dispatch:

jobs:

  # ───────── JOB 1: VALIDAR OPENAPI ─────────
  validar:

    runs-on: ubuntu-latest

    steps:

      # Baixa o código do repositório
      - name: Baixar o código
        uses: actions/checkout@v4

      # Instala Node.js
      - name: Instalar Node.js
        uses: actions/setup-node@v4

        with:
          node-version: "20"

      # Valida o contrato OpenAPI
      - name: Validar OpenAPI com Spectral

        run: |
          npx --yes @stoplight/spectral-cli@6 lint \
          --ruleset "spectral:oas" \
          openapi.yaml

  # ───────── JOB 2: PUBLICAR DOCUMENTAÇÃO ─────────
  publicar-docs:

    needs: validar

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      # Baixa o código
      - name: Baixar código
        uses: actions/checkout@v4

      # Gera documentação HTML
      - name: Gerar HTML com Redoc

        run: |
          mkdir -p docs
          npx --yes @redocly/cli build-docs openapi.yaml --output docs/index.html

      # Publica no GitHub Pages
      - name: Publicar no GitHub Pages

        uses: peaceiris/actions-gh-pages@v3

        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs